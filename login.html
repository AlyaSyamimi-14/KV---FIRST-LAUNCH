<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Student Attendance System</title>
    <style>
        :root { --kv-primary: #003366; --kv-orange: #F55729; }
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .login-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; border-top: 8px solid var(--kv-primary); position: relative; }
        .back-arrow { position: absolute; top: 15px; left: 20px; font-size: 45px; font-weight: bold; color: var(--kv-primary); text-decoration: none; cursor: pointer; transition: 0.3s; display: none; line-height: 1; }
        .back-arrow:hover { color: var(--kv-orange); transform: translateX(-5px); }
        .logo img { max-width: 200px; margin-bottom: 20px; }
        h2 { color: var(--kv-primary); margin-bottom: 20px; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .role-selection { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .role-option { display: flex; align-items: center; gap: 5px; font-size: 14px; cursor: pointer; }
        .role-option input { width: auto; cursor: pointer; }
        .btn-kv { width: 100%; padding: 14px; background: var(--kv-orange); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-kv:hover { background: #e44d22; }
        .link-reg { margin-top: 20px; font-size: 13px; }
        .link-reg a { color: var(--kv-primary); text-decoration: none; font-weight: bold; cursor: pointer; }
        #registration-section { display: none; }
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 320px; text-align: center; }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn-confirm { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-cancel { background: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <a class="back-arrow" id="backBtn" onclick="showLogin()">&#10229;</a>
        <div class="logo"><img src="WhatsApp Image 2026-01-11 at 12.37.08.jpeg" alt="KV Logo"></div>

        <div id="login-section" style="max-width: 350px; margin: 0 auto;">
            <h2>Login</h2>
            <div class="role-selection">
                <label class="role-option"><input type="radio" name="loginRole" value="Teacher" checked> Teacher</label>
                <label class="role-option"><input type="radio" name="loginRole" value="Penyelaras Intervensi"> Penyelaras Intervensi</label>
            </div>
            <div class="input-group"><label>ID Number</label><input type="text" id="loginID" placeholder="Enter your ID"></div>
            <div class="input-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"></div>
            <button class="btn-kv" onclick="checkLogin()">LOGIN</button>
            <div class="link-reg">Don't have an account? <a onclick="showRegistration()">Register here</a></div>
        </div>

        <div id="registration-section">
            <h2>Teacher Registration</h2>
            <div class="form-grid">
                <div class="input-group"><label>Teacher ID</label><input type="text" id="regID" placeholder="ID"></div>
                <div class="input-group"><label>IC Number</label><input type="text" id="regIC" placeholder="IC Number"></div>
                <div class="input-group full-width"><label>Full Name</label><input type="text" id="regName" placeholder="Enter Full Name"></div>
                <div class="input-group"><label>Phone</label><input type="text" id="regPhone" placeholder="Phone No."></div>
                <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="Email"></div>
                <div class="input-group full-width"><label>Password</label><input type="password" id="regPass" placeholder="Create Password"></div>
                <div class="full-width"><button class="btn-kv" onclick="askConfirmation()">CREATE ACCOUNT</button></div>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--kv-primary);">Confirm Creation?</h3>
            <p>Do you want to proceed with creating this teacher account?</p>
            <div class="modal-btns">
                <button class="btn-confirm" onclick="processConfirm()">Confirm</button>
                <button class="btn-cancel" onclick="processCancel()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        function showRegistration() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('registration-section').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block'; 
        }

        function showLogin() {
            document.getElementById('registration-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('backBtn').style.display = 'none'; 
        }

        function askConfirmation() { 
            const id = document.getElementById('regID').value.trim();
            const name = document.getElementById('regName').value.trim();
            const pass = document.getElementById('regPass').value;
            if(!id || !pass || !name) { alert("Please fill in ID, Name and Password!"); return; }
            document.getElementById('confirmModal').style.display = 'block'; 
        }

        function processConfirm() {
            const id = document.getElementById('regID').value.trim();
            const ic = document.getElementById('regIC').value.trim();
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            
            // Simpan semua data ke localStorage
            localStorage.setItem('reg_id', id);
            localStorage.setItem('reg_ic', ic);
            localStorage.setItem('reg_name', name);
            localStorage.setItem('reg_phone', phone);
            localStorage.setItem('reg_email', email);
            localStorage.setItem('reg_pass', pass);
            
            alert("Account created successfully!");
            document.getElementById('confirmModal').style.display = 'none';
            showLogin();
        }

        function checkLogin() {
            const inputID = document.getElementById('loginID').value.trim();
            const inputPass = document.getElementById('loginPass').value;
            const selectedRole = document.querySelector('input[name="loginRole"]:checked').value;

            if (selectedRole === "Penyelaras Intervensi") {
                if (inputID.toUpperCase() === "ADMIN123" && inputPass === "PASSWORD123") {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('active_role', "Penyelaras Intervensi");
                    localStorage.setItem('active_name', "Admin Penyelaras");
                    window.location.href = "Dashboard.html";
                } else { alert("Invalid Admin Credentials!"); }
            } else {
                const storedID = localStorage.getItem('reg_id');
                const storedPass = localStorage.getItem('reg_pass');
                const storedName = localStorage.getItem('reg_name');

                if (storedID && inputID === storedID && inputPass === storedPass) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('active_role', "Teacher");
                    localStorage.setItem('active_name', storedName);
                    window.location.href = "Dashboard.html"; 
                } else { alert("Invalid Teacher Credentials!"); }
            }
        }

        function processCancel() { document.getElementById('confirmModal').style.display = 'none'; }
    </script>
</body>
</html>
